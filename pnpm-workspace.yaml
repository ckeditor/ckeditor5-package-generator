packages:
  - packages/*

onlyBuiltDependencies:
  - esbuild
  - puppeteer

overrides:
  'diff@^7': '^8.0.3'
  'qs@^6': '^6.14.2'
  'serialize-javascript@^6': '^7.0.5'
  'yaml@^2': '^2.8.3'

minimumReleaseAge: 4320 # 3 days
minimumReleaseAgeExclude:
  - '@ckeditor/*'
  - '@cksource/*'
  - '*ckeditor5*'
  - 'postcss' # Needed for version 8.5.15. Remove after 2026-05-22T09:51:29Z

linkWorkspacePackages: true
preferFrozenLockfile: true
shamefullyHoist: true
shellEmulator: true
